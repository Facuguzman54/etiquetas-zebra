<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador Zebra - Arcor v4.0</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://images.icon-icons.com/1446/PNG/512/22229zebra_98835.png">
    <link rel="apple-touch-icon" href="https://images.icon-icons.com/1446/PNG/512/22229zebra_98835.png">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0056b3">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="theme-toggle" class="floating-btn" onclick="toggleDarkMode()">
        <span id="theme-icon">🌙</span>
    </button>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Historial Reciente</h3>
            <button class="btn-close" onclick="toggleSidebar()">×</button>
        </div>
        <div id="historial-lista" class="historial-container">
        </div>
        <button class="btn-clear" onclick="limpiarHistorial()">Limpiar Historial</button>
    </div>

    <button class="floating-btn" style="left: 20px; right: auto;" onclick="toggleSidebar()">
        <span>📜</span>
    </button>
    <div class="card">
        <header>
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Arcor_textlogo.png" alt="Arcor"
                class="logo-arcor">
            <h1 style="font-size: 1.1rem; margin:0;">GENERADOR DE ETIQUETAS ZEBRA</h1>
        </header>

        <div class="row">
            <div>
                <label>IMPRESORA</label>
                <select id="printerIp" onchange="verificarPasswordImpresora()">
                    <option value="" disabled selected>-- SELECCIONAR IMPRESORA --</option>
                    <option value="10.54.204.171">CONSERVAS</option>
                    <option value="10.54.204.152">PASTA</option>
                    <option value="10.54.204.151">ETIQUETADO</option>
                    <option value="" disabled>FEM (proximamente...)</option>
                </select>
            </div>
            <div style="flex: 0.4;">
                <label>COPIAS</label>
                <input type="number" id="copias" value="1" min="1" max="10">
            </div>
        </div>

        <div class="controls-group">
            <label class="checkbox-item">
                <input type="checkbox" id="chkEncabezado" onchange="toggleEncabezado()"> ENCABEZADO
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="chkInversion"> MODO NEGRO
            </label>
        </div>

        <div id="sectionEncabezado" class="section hidden">
            <label>TIPO DE PRODUCTO</label>
            <select id="selectLinea" onchange="cargarProductos()">
                <option value="">-- Seleccione linea --</option>
                <option value="SALSAS">SALSAS Y ADEREZOS</option>
                <option value="PURE_PULPA">PURE Y PULPA</option>
                <option value="PASTAS">PASTAS</option>
                <option value="PT">TOMATE (PT)</option>
                <option value="SE">TOMATE (SE)</option>
            </select>

            <label>PRODUCTO</label>
            <select id="selectProducto">
                <option value="">Elija una linea primero...</option>
            </select>

            <label>FECHA</label>
            <input type="date" id="fechaEtiqueta">
        </div>

        <label>CONTENIDO DE LA ETIQUETA</label>
        <textarea id="textoEtiqueta" placeholder="ESCRIBA AQUÍ..." oninput="validar()"></textarea>
        <div id="status"></div>

        <div class="row">
            <div>
                <label>TAMAÑO</label>
                <select id="tamano" onchange="validar()">
                    <option value="60">Pequeño</option>
                    <option value="100" selected>Mediano</option>
                    <option value="160">Grande</option>
                    <option value="210">Extra Grande</option>
                </select>
            </div>
            <div>
                <label>ORIENTACIÓN</label>
                <select id="orientacion">
                    <option value="V">Vertical</option>
                    <option value="H">Horizontal</option>
                </select>
            </div>
        </div>

        <button id="btnImprimir" onclick="imprimir()">IMPRIMIR ETIQUETA</button>
    </div>

    <div id="modalSeguridad" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modalContentPassword">
                <h2 style="color: var(--primary-color); margin-top: 0;">🔐 Acceso Restringido</h2>
                <p>Ingrese la contraseña para habilitar esta impresora:</p>
                <input type="password" id="passImpresora" placeholder="Contraseña..."
                    style="text-align: center; margin-bottom: 20px;">
                <div class="row">
                    <button onclick="validarPassword()" style="flex:1;">INGRESAR</button>
                    <button class="btn-cancelar" onclick="cancelarSeleccion()"
                        style="flex:1; margin-top:0;">CANCELAR</button>
                </div>
            </div>

            <div id="modalContentAlerta" class="hidden">
                <h2 style="color: var(--error-color); margin-top: 0;">⚠️ Seguridad</h2>
                <p id="mensajeAlerta"></p>
                <button class="btn-cancelar" onclick="cerrarModal()">VOLVER</button>
            </div>
        </div>
    </div>

    <footer>Hecho por Facu - v3.5</footer>
    <button class="preview-btn" onclick="mostrarPreview()" title="Vista Previa">
        <span id="eye-icon">👁️</span>
    </button>

    <div id="modalPreview" class="modal-overlay hidden">
        <div class="modal-content preview-content">
            <h3>VISTA PREVIA</h3>
            <div id="previewContainer">
                <img id="labelaryImage" src="" alt="Cargando etiqueta...">
            </div>
            <button onclick="cerrarPreview()" class="btn-cancelar">CERRAR</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
